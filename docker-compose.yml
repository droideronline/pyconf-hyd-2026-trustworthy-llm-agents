services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: support
      POSTGRES_PASSWORD: support
      POSTGRES_DB: support_swarm
    volumes:
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U support -d support_swarm"]
      interval: 5s
      timeout: 5s
      retries: 5

  langgraph:
    build:
      context: .
      dockerfile: docker/Dockerfile.langgraph
    ports:
      - "2024:2024"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://support:support@db:5432/support_swarm
    depends_on:
      db:
        condition: service_healthy

  ui:
    build:
      context: .
      dockerfile: docker/Dockerfile.ui
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:2024
      NEXT_PUBLIC_ASSISTANT_ID: shop_assist
      LANGGRAPH_API_URL: http://langgraph:2024
    depends_on:
      - langgraph

  evals:
    build:
      context: .
      dockerfile: docker/Dockerfile.evals
    env_file:
      - .env
    environment:
      LANGGRAPH_URL: http://langgraph:2024
    volumes:
      - ./evals:/app/evals
      - ./support_swarm:/app/support_swarm
    depends_on:
      - langgraph
    profiles:
      - evals

volumes:
  pgdata:
